services:
  tribal-village:
    image: coworld-tribal-village:latest
    platform: linux/amd64
    build:
      context: .
  tribal-village-player:
    image: coworld-tribal-village-player:latest
    platform: linux/amd64
    build:
      context: .
      dockerfile: players/villager/Dockerfile
  commissioner:
    image: coworld-tribal-village-commissioner:latest
    platform: linux/amd64
    build:
      context: ./commissioner
      dockerfile: commissioners/Dockerfile
      args:
        COMMISSIONER_KEY: config_driven
        RULESET_STRATEGY_CONFIG_NAME: default
