name: Upload Coworld (manual)

# Manual-only deploy scaffold. This intentionally has no push trigger:
# after SOFTMAX_API_KEY is configured and this repo is ready for automatic
# deploys, add a default-branch push trigger with narrow path filters.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Coworld version. Blank auto-resolves only when confirm_upload=upload; dry-run uses 0.0.0."
        required: false
        default: ""
      confirm_upload:
        description: "Type upload to publish to Softmax. The default only builds the manifest."
        required: true
        default: "dry-run"

concurrency:
  group: upload-coworld
  cancel-in-progress: false

env:
  COWORLD_NAME: tribal_village
  COWORLD_CLI: "coworld[auth] @ git+https://github.com/Metta-AI/coworld.git@main"

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - uses: docker/setup-buildx-action@v3

      - name: Install coworld CLI
        run: uvx --from "$COWORLD_CLI" coworld --help >/dev/null

      - name: Seed Softmax credentials
        if: ${{ github.event.inputs.confirm_upload == 'upload' }}
        env:
          SOFTMAX_API_KEY: ${{ secrets.SOFTMAX_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$SOFTMAX_API_KEY" ]; then
            echo "::error::SOFTMAX_API_KEY is required for upload. Leave confirm_upload as dry-run to build only."
            exit 1
          fi
          uvx --from "$COWORLD_CLI" softmax set-token "$SOFTMAX_API_KEY" --server https://softmax.com/api
          uv run --with "$COWORLD_CLI" python3 -c "from softmax.auth import clear_active_player_session; clear_active_player_session(server='https://softmax.com/api')"

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ github.event.inputs.version }}"
          CONFIRM_UPLOAD="${{ github.event.inputs.confirm_upload }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [ "$CONFIRM_UPLOAD" = "upload" ]; then
            VERSION="$(uvx --from "$COWORLD_CLI" coworld next-version "$COWORLD_NAME" --server https://softmax.com/api)"
          else
            VERSION="0.0.0"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building ${COWORLD_NAME}:${VERSION}"

      - name: Build coworld manifest
        run: |
          uvx --from "$COWORLD_CLI" coworld build \
            --version "${{ steps.version.outputs.version }}" \
            --output tmp/coworld_manifest.json

      - name: Upload coworld
        if: ${{ github.event.inputs.confirm_upload == 'upload' }}
        run: |
          uvx --from "$COWORLD_CLI" coworld upload-coworld tmp/coworld_manifest.json \
            --server https://softmax.com/api \
            --wait-hosted-smoke \
            --hosted-smoke-timeout-seconds 1800

      - name: Verify canonical promotion
        if: ${{ github.event.inputs.confirm_upload == 'upload' }}
        run: |
          set -euo pipefail
          uvx --from "$COWORLD_CLI" coworld list --json --limit 500 --server https://softmax.com/api | python3 -c '
          import json, sys
          name = sys.argv[1]
          version = sys.argv[2]
          rows = json.load(sys.stdin)
          match = next((r for r in rows if r.get("name") == name and r.get("version") == version), None)
          if match is None:
              raise SystemExit(f"::error::{name}:{version} not found after upload")
          if not match.get("canonical"):
              raise SystemExit(f"::error::{name}:{version} uploaded but is not canonical")
          print(f"{name}:{version} is canonical ({match['id']})")
          ' "$COWORLD_NAME" "${{ steps.version.outputs.version }}"
