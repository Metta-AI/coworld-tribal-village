name: Build Coworld role images

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/build-role-images.yml"
      - "commissioner/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-role-images.yml"
      - "commissioner/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          REPO="${{ env.REGISTRY }}/metta-ai/coworld-tribal-village-commissioner"
          SHORT_SHA="${GITHUB_SHA::12}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TAGS="${REPO}:pr-${{ github.event.number }}"
          else
            TAGS="${REPO}:latest,${REPO}:main-${SHORT_SHA}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./commissioner
          file: ./commissioner/commissioners/Dockerfile
          build-args: |
            COMMISSIONER_KEY=config_driven
            RULESET_STRATEGY_CONFIG_NAME=default
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
